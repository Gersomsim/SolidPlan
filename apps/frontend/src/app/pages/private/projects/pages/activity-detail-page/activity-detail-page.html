@if (activity(); as act) {
  <!-- ── Breadcrumb & back ──────────────────────────────────── -->
  <div class="flex items-center gap-2 mb-6">
    <a
      [routerLink]="['/system/projects', projectId(), 'activities']"
      class="flex items-center gap-1.5 text-small text-text-secondary hover:text-primary dark:text-dark-text/50 dark:hover:text-primary-light transition-colors"
    >
      <lib-ui-icon icon="arrow-left" [size]="15" />
      Actividades
    </a>
    <lib-ui-icon icon="chevron-right" [size]="14" class="text-border dark:text-dark-border" />
    <span class="font-mono text-small font-semibold text-text-secondary dark:text-dark-text/60">{{ act.code }}</span>
    <lib-ui-icon icon="chevron-right" [size]="14" class="text-border dark:text-dark-border" />
    <span class="text-small text-text-primary dark:text-dark-text font-medium truncate max-w-xs">{{ act.name }}</span>
  </div>

  <!-- ── Page header ───────────────────────────────────────── -->
  <div class="flex items-start justify-between gap-4 mb-8">
    <div class="flex-1 min-w-0">
      <div class="flex flex-wrap items-center gap-3 mb-3">
        <span class="font-mono text-small font-semibold px-3 py-1 rounded-badge bg-primary/10 text-primary dark:bg-primary-light/10 dark:text-primary-light">
          {{ act.code }}
        </span>
        <lib-badge [variant]="statusBadgeVariant()" [label]="statusLabel()" size="sm" />
        @if (act.isCriticalPath) {
          <span class="flex items-center gap-1 px-2.5 py-1 rounded-badge bg-accent/10 text-accent text-xs font-medium uppercase tracking-wide">
            <lib-ui-icon icon="zap" [size]="11" />
            Ruta crítica
          </span>
        }
      </div>
      <h1 class="text-h1 font-bold text-text-primary dark:text-dark-text leading-tight">{{ act.name }}</h1>
    </div>

    <!-- Action buttons -->
    <div class="flex items-center gap-2 shrink-0">
      <a
        [routerLink]="['/system/projects', projectId(), 'activities', activityId(), 'edit']"
        class="flex items-center gap-2 px-4 py-2 rounded-input border border-border dark:border-dark-border text-small font-medium text-text-secondary hover:text-text-primary hover:bg-secondary-bg dark:text-dark-text/60 dark:hover:text-dark-text dark:hover:bg-white/10 transition-colors"
      >
        <lib-ui-icon icon="user-pen" [size]="15" />
        Editar
      </a>
      <button class="flex items-center gap-2 px-4 py-2 rounded-input bg-primary hover:bg-primary-hover text-white text-small font-medium transition-colors">
        <lib-ui-icon icon="loader" [size]="15" />
        Actualizar progreso
      </button>
    </div>
  </div>

  <!-- ── Detail view ───────────────────────────────────────── -->
  <app-activity-detail-view
    [activity]="act"
    layout="page"
    [projectId]="projectId()"
  />

} @else {
  <!-- Not found -->
  <div class="flex flex-col items-center justify-center py-24 text-center">
    <div class="w-16 h-16 rounded-full bg-secondary-bg dark:bg-white/10 flex items-center justify-center mb-4">
      <lib-ui-icon icon="search" [size]="28" class="text-text-secondary dark:text-dark-text/40" />
    </div>
    <h2 class="text-h3 font-semibold text-text-primary dark:text-dark-text mb-2">Actividad no encontrada</h2>
    <p class="text-small text-text-secondary dark:text-dark-text/60 mb-6">
      La actividad que buscas no existe o fue eliminada.
    </p>
    <a
      [routerLink]="['/system/projects', projectId(), 'activities']"
      class="flex items-center gap-2 px-5 py-2.5 bg-primary hover:bg-primary-hover text-white text-small font-medium rounded-input transition-colors"
    >
      <lib-ui-icon icon="arrow-left" [size]="15" />
      Volver a actividades
    </a>
  </div>
}
