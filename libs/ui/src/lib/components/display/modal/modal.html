@if (open()) {
  <!-- Backdrop -->
  <div
    class="modal-backdrop fixed inset-0 z-50 flex items-start justify-center p-4 pt-[5vh] bg-black/50 backdrop-blur-sm overflow-y-auto"
    (click)="onBackdropClick($event)"
  >
    <!-- Panel -->
    <div [class]="panelClass()">

      <!-- Header -->
      @if (title() || showClose()) {
        <div class="flex items-center gap-3 px-6 py-4 border-b border-border dark:border-dark-border shrink-0">
          @if (title()) {
            <h2 class="flex-1 text-h4 font-semibold text-text-primary dark:text-dark-text truncate">{{ title() }}</h2>
          } @else {
            <div class="flex-1">
              <ng-content select="[modal-header]" />
            </div>
          }
          @if (showClose()) {
            <button
              type="button"
              class="flex items-center justify-center w-8 h-8 rounded-default shrink-0 text-text-secondary hover:text-text-primary hover:bg-secondary-bg dark:text-dark-text/50 dark:hover:text-dark-text dark:hover:bg-white/10 transition-colors"
              (click)="closed.emit()"
            >
              <lib-ui-icon icon="x" [size]="18" />
            </button>
          }
        </div>
      }

      <!-- Body -->
      <div class="flex-1 overflow-y-auto">
        <ng-content />
      </div>

      <!-- Footer (only renders when content is projected) -->
      @if (footerSlot()) {
        <div class="shrink-0 px-6 py-4 border-t border-border dark:border-dark-border bg-background dark:bg-dark-background/50">
          <ng-template [ngTemplateOutlet]="footerSlot()!.template" />
        </div>
      }

    </div>
  </div>
}
