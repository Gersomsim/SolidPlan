<article [class]="containerClasses()">
  @if (headerSlot()) {
    <header [class]="contentPaddingClass()">
      <ng-container [ngTemplateOutlet]="headerSlot()!.template" />
    </header>
  } @else if (hasDefaultHeader()) {
    <header [class]="contentPaddingClass()">
      <div class="flex items-start justify-between gap-4">
        <div class="flex min-w-0 flex-1 items-start gap-3">
          @if (prefixSlot()) {
            <div class="shrink-0 text-text-secondary dark:text-dark-text">
              <ng-container [ngTemplateOutlet]="prefixSlot()!.template" />
            </div>
          }

          <div class="min-w-0 flex-1">
            @if (title().trim()) {
              <h3 class="text-h4 font-semibold text-text-primary dark:text-dark-text">
                {{ title() }}
              </h3>
            }

            @if (subtitle().trim()) {
              <p class="mt-1 text-small text-text-secondary dark:text-dark-text/80">
                {{ subtitle() }}
              </p>
            }
          </div>
        </div>

        @if (actionsSlot()) {
          <div class="shrink-0">
            <ng-container [ngTemplateOutlet]="actionsSlot()!.template" />
          </div>
        }
      </div>
    </header>
  }

  <section [class]="contentPaddingClass()">
    <ng-content />
  </section>

  @if (footerSlot()) {
    <footer
      [class]="'border-t border-border bg-background dark:bg-dark-background ' + footerPaddingClass()"
    >
      <ng-container [ngTemplateOutlet]="footerSlot()!.template" />
    </footer>
  }

  @if (loading()) {
    <div
      class="absolute inset-0 z-10 flex items-center justify-center bg-surface/80 backdrop-blur-[1px] dark:bg-dark-surface/80"
      aria-hidden="true"
      data-testid="card-loading-overlay"
    >
      <div class="w-full px-6">
        <div class="h-5 w-1/3 animate-pulse rounded bg-border dark:bg-white/10"></div>
        <div class="mt-4 h-4 w-full animate-pulse rounded bg-border dark:bg-white/10"></div>
        <div class="mt-2 h-4 w-5/6 animate-pulse rounded bg-border dark:bg-white/10"></div>
      </div>
    </div>
  }
</article>
