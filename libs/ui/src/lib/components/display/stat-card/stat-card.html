<div class="bg-surface dark:bg-dark-surface border border-border dark:border-white/10 rounded-card p-5 shadow-card hover:shadow-hover transition-shadow duration-200">
  <div class="flex items-start justify-between gap-4">
    <div class="flex flex-col gap-1 min-w-0">
      <p class="text-label font-medium text-text-secondary dark:text-dark-text/60 uppercase tracking-wide">{{ label() }}</p>
      <p class="text-h2 font-semibold text-text-primary dark:text-dark-text leading-none mt-1">{{ value() }}</p>
      @if (sublabel()) {
        <p class="text-small text-text-secondary dark:text-dark-text/60 mt-0.5">{{ sublabel() }}</p>
      }
    </div>
    <div [class]="iconContainerClass()">
      <lib-ui-icon [icon]="icon()" [size]="22" />
    </div>
  </div>
</div>
