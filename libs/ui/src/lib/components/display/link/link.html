<ng-template #content><ng-content /></ng-template>

@if (routerLink()) {
  <a [routerLink]="routerLink()" [target]="target()" [class]="linkClass()">
    <ng-container [ngTemplateOutlet]="content" />
  </a>
} @else {
  <a [attr.href]="href() || null" [target]="target()" [class]="linkClass()">
    <ng-container [ngTemplateOutlet]="content" />
  </a>
}
